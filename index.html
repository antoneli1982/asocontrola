/* ===== HELPERS ===== */
function parseDate(s){if(!s)return null;const p=s.split("/");return p.length===3?new Date(+p[2],+p[1]-1,+p[0]):null}
function toISO(ddmmyyyy){if(!ddmmyyyy)return"";const p=ddmmyyyy.split("/");return p.length===3?p[2]+"-"+p[1]+"-"+p[0]:""}
function fromISO(iso){if(!iso)return"";const p=iso.split("-");return p.length===3?p[2]+"/"+p[1]+"/"+p[0]:""}
function daysUntil(s){const d=parseDate(s);if(!d)return Infinity;const n=new Date();n.setHours(0,0,0,0);return Math.ceil((d-n)/864e5)}
function statusColor(s){const d=daysUntil(s);if(d<0)return{color:"#dc2626",label:"VENCIDO",bg:"rgba(220,38,38,0.12)"};if(d<=2)return{color:"#dc2626",label:d+"d",bg:"rgba(220,38,38,0.12)"};if(d<=7)return{color:"#d97706",label:d+"d",bg:"rgba(217,119,6,0.10)"};if(d<=30)return{color:"#2563eb",label:d+"d",bg:"rgba(37,99,235,0.08)"};return{color:"#16a34a",label:d+"d",bg:"rgba(22,163,74,0.08)"}}
function initials(name){return name.split(" ").filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase()}
function fmtNow(){const d=new Date();return d.toLocaleDateString("pt-BR")+" "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}
function norm(s){return(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase()}

function readFileAsBase64(file,maxW=200){
  return new Promise((res)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement("canvas");
        const ratio=Math.min(maxW/img.width,maxW/img.height,1);
        c.width=img.width*ratio;c.height=img.height*ratio;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg",0.7));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ===== FIREBASE DB HELPERS ===== */
/* Firebase RTDB keys cannot contain . $ # [ ] / */
function fbKey(s){return(s||"").replace(/[.#$\[\]\/]/g,"_")}
const dbSet=(path,val)=>db.ref(path).set(val).catch(e=>{console.error("DB set error:",e);throw e});
const dbGet=async(path)=>{const snap=await db.ref(path).once("value");return snap.val()};
const dbPush=(path,val)=>db.ref(path).push(val).catch(e=>console.error("DB push error:",e));

/* ===== LOG HELPERS (Firebase) ===== */
function addLog(action,user,detail){
  const entry={ts:fmtNow(),action,user,detail,timestamp:Date.now()};
  dbPush("logs",entry);
}

/* ===== MIGRATE localStorage → Firebase (one-time) ===== */
async function migrateLocalToFirebase(){
  try{
    const migrated=localStorage.getItem("aso_fb_migrated");
    if(migrated)return;
    /* Migrate users */
    const localUsers=JSON.parse(localStorage.getItem("aso_users")||"{}");
    for(const[k,v] of Object.entries(localUsers)){
      const fk=fbKey(k);
      const existing=await dbGet("users/"+fk);
      if(!existing){await dbSet("users/"+fk,v);console.log("Migrated user:",k)}
    }
    /* Migrate records */
    const localRecs=localStorage.getItem("aso_records");
    if(localRecs){
      const recs=JSON.parse(localRecs);
      if(Array.isArray(recs)&&recs.length>0){
        const existing=await dbGet("records");
        if(!existing||!Array.isArray(existing)||existing.length===0){
          await dbSet("records",recs);
          console.log("Migrated",recs.length,"records");
        }
      }
    }
    /* Migrate logs */
    const localLogs=JSON.parse(localStorage.getItem("aso_logs")||"[]");
    if(localLogs.length>0){
      for(const log of localLogs.slice(0,50)){
        await dbPush("logs",{...log,timestamp:Date.now()});
      }
      console.log("Migrated",Math.min(localLogs.length,50),"logs");
    }
    localStorage.setItem("aso_fb_migrated","1");
    console.log("Migration complete!");
  }catch(e){console.error("Migration error:",e)}
}
migrateLocalToFirebase();

/* Custom hook: listen to a Firebase path */
function useFirebase(path,fallback){
  const[data,setData]=useState(fallback);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    const ref=db.ref(path);
    const handler=ref.on("value",snap=>{
      const val=snap.val();
      setData(val!==null?val:fallback);
      setLoading(false);
    },err=>{console.error("Firebase listen error:",err);setLoading(false)});
    return()=>ref.off("value",handler);
  },[path]);
  return[data,setData,loading];
}

/* ===== AVATAR ===== */
function Avatar({src,name,size=36,accent="#0ea5e9"}){
  if(src)return <img src={src} alt="" style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",border:"2px solid "+accent+"44",flexShrink:0}}/>;
  const ini=initials(name||"?");
  const colors=["#e94560","#0ea5e9","#16a34a","#d97706","#bb86fc","#ff6b35","#0d9488","#6366f1"];
  const bg=colors[Math.abs([...ini].reduce((a,c)=>a+c.charCodeAt(0),0))%colors.length];
  return <div className="av-placeholder" style={{width:size,height:size,borderRadius:"50%",background:bg+"22",border:"2px solid "+bg+"44",display:"flex",alignItems:"center",justifyContent:"center",color:bg,fontSize:size*0.38,fontWeight:700,flexShrink:0,lineHeight:1}}>{ini}</div>;
}

  useEffect(()=>{if(!active){setF(0);return}const id=setInterval(()=>setF(x=>x+1),400);return()=>clearInterval(id)},[active]);
  const r=f%2===0,lL=active?(r?"#ff1744":"#1565c0"):"#555",lR=active?(r?"#1565c0":"#ff1744"):"#555",dome=active?(r?"#ff1744":"#1565c0"):"#888";
  return(
    <div style={{position:"relative",display:"inline-flex",alignItems:"center",justifyContent:"center"}}>
      {active&&<><div style={{position:"absolute",width:size*1.8,height:size*1.8,borderRadius:"50%",border:"2px solid "+(r?"rgba(255,23,68,0.3)":"rgba(21,101,192,0.3)"),animation:"sirenPulse 1s ease-out infinite",pointerEvents:"none"}}/><div style={{position:"absolute",width:size*2.4,height:size*2.4,borderRadius:"50%",border:"1.5px solid "+(r?"rgba(255,23,68,0.15)":"rgba(21,101,192,0.15)"),animation:"sirenPulse 1s ease-out infinite 0.3s",pointerEvents:"none"}}/></>}
      <svg width={size} height={size} viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs><filter id="gL"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="gR"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="gD"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><linearGradient id="bG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={active?"#e53935":"#777"}/><stop offset="100%" stopColor={active?"#b71c1c":"#555"}/></linearGradient></defs>
        <rect x="15" y="58" width="70" height="28" rx="6" fill="url(#bG)" stroke={active?"#c62828":"#444"} strokeWidth="1.5"/>
        <rect x="44" y="64" width="12" height="4" rx="1.5" fill="#fff" opacity={active?"0.9":"0.3"}/><rect x="48" y="60" width="4" height="12" rx="1.5" fill="#fff" opacity={active?"0.9":"0.3"}/>
        <rect x="28" y="78" width="44" height="8" rx="3" fill={active?"#b71c1c":"#666"} stroke={active?"#7f0000":"#444"} strokeWidth="0.8"/>
        <ellipse cx="50" cy="44" rx="14" ry="18" fill={dome} filter={active?"url(#gD)":undefined} opacity={active?1:0.5}>{active&&<animate attributeName="opacity" values="1;0.6;1" dur="0.8s" repeatCount="indefinite"/>}</ellipse>
        <ellipse cx="46" cy="38" rx="6" ry="9" fill="#fff" opacity={active?"0.3":"0.1"}/><ellipse cx="50" cy="32" rx="3" ry="4" fill="#fff" opacity={active?"0.2":"0.05"}/>
        <circle cx="22" cy="65" r="6" fill={lL} filter={active?"url(#gL)":undefined} opacity={active?1:0.4}>{active&&<animate attributeName="r" values="6;7;6" dur="0.4s" repeatCount="indefinite"/>}</circle>
        <circle cx="78" cy="65" r="6" fill={lR} filter={active?"url(#gR)":undefined} opacity={active?1:0.4}>{active&&<animate attributeName="r" values="6;7;6" dur="0.4s" repeatCount="indefinite"/>}</circle>
        {active&&<g opacity={r?"0.6":"0.4"}><line x1="50" y1="22" x2="50" y2="12" stroke={dome} strokeWidth="2" strokeLinecap="round"/><line x1="36" y1="28" x2="30" y2="20" stroke={dome} strokeWidth="1.5" strokeLinecap="round"/><line x1="64" y1="28" x2="70" y2="20" stroke={dome} strokeWidth="1.5" strokeLinecap="round"/></g>}
      </svg>
    </div>
  );
}

/* ===== AUTH ===== */
function Auth({onLogin}){
  const[mode,setMode]=useState("login");
  const[regType,setRegType]=useState("operacional");
  const[user,setUser]=useState("");const[pass,setPass]=useState("");const[pc,setPc]=useState("");
  const[seniorPass,setSeniorPass]=useState("");
  const[sp,setSp]=useState(false);const[err,setErr]=useState("");const[ok,setOk]=useState("");
  const[foto,setFoto]=useState("");
  const[editFound,setEditFound]=useState(false);
  const[editNewPass,setEditNewPass]=useState("");const[editNewPc,setEditNewPc]=useState("");
  const fotoRef=useRef();
  const cl=()=>{setErr("");setOk("")};

  const handleFoto=async e=>{
    const file=e.target.files?.[0];if(!file)return;
    const b64=await readFileAsBase64(file,200);setFoto(b64);e.target.value="";
  };

  const doLogin=async()=>{
    if(!user.trim()||!pass.trim()){setErr("Preencha todos os campos");return}
    const k=fbKey(user.trim().toLowerCase());
    try{
      const userData=await dbGet("users/"+k);
      if(!userData){setErr("Usuário não encontrado");return}
      if(userData.pass!==pass){setErr("Senha incorreta");return}
      addLog("LOGIN",user.trim(),"Entrou no sistema");
      onLogin(user.trim(),userData.foto||"",userData.role||"operacional");
    }catch(e){setErr("Erro de conexão. Verifique sua internet.")}
  };

  const doReg=async()=>{
    if(!user.trim()||!pass.trim()||!pc.trim()){setErr("Preencha todos os campos");return}
    if(pass.length<4){setErr("Senha deve ter pelo menos 4 caracteres");return}
    if(pass!==pc){setErr("As senhas não coincidem");return}
    if(regType==="senior"&&seniorPass!==SENIOR_PASS){setErr("Senha de autorização Sênior incorreta");return}
    const k=fbKey(user.trim().toLowerCase());
    try{
      const existing=await dbGet("users/"+k);
      if(existing){setErr("Usuário já existe");return}
      await dbSet("users/"+k,{pass,foto,role:regType});
      addLog("CADASTRO",user.trim(),"Novo usuário "+regType);
      setOk("Cadastro realizado! Redirecionando...");
      setTimeout(()=>{setMode("login");setPass("");setPc("");setFoto("");setOk("");setSeniorPass("");setRegType("operacional")},1200);
    }catch(e){setErr("Erro de conexão. Verifique sua internet.")}
  };

  /* EDIT PROFILE — find user */
  const doEditFind=async()=>{
    if(!user.trim()){setErr("Digite o nome de usuário");return}
    const k=fbKey(user.trim().toLowerCase());
    try{
      const userData=await dbGet("users/"+k);
      if(!userData){setErr("Usuário não encontrado. Verifique o nome digitado.");return}
      setFoto(userData.foto||"");
      setEditFound(true);setEditNewPass("");setEditNewPc("");cl();
    }catch(e){setErr("Erro de conexão. Verifique sua internet.")}
  };

  /* EDIT PROFILE — save changes */
  const doEditSave=async()=>{
    const k=fbKey(user.trim().toLowerCase());
    try{
      const userData=await dbGet("users/"+k);
      if(!userData){setErr("Usuário não encontrado");return}
      let changed=[];
      if(foto!==(userData.foto||"")){userData.foto=foto;changed.push("foto")}
      if(editNewPass.trim()){
        if(editNewPass.length<4){setErr("Nova senha deve ter pelo menos 4 caracteres");return}
        if(editNewPass!==editNewPc){setErr("As senhas não coincidem");return}
        userData.pass=editNewPass;changed.push("senha");
      }
      if(changed.length===0){setErr("Nenhuma alteração detectada");return}
      await dbSet("users/"+k,userData);
      addLog("EDITOU PERFIL",user.trim(),"Alterou: "+changed.join(", "));
      setOk("Perfil atualizado com sucesso!");
      setTimeout(()=>{setMode("login");setPass("");setFoto("");setOk("");setEditFound(false);setEditNewPass("");setEditNewPc("")},1500);
    }catch(e){setErr("Erro de conexão. Verifique sua internet.")}
  };

  const switchMode=(m)=>{setMode(m);cl();setFoto("");setEditFound(false);setEditNewPass("");setEditNewPc("")};

  const ist={width:"100%",padding:"13px 14px 13px 46px",borderRadius:12,border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#1e293b",fontSize:15,outline:"none",boxSizing:"border-box",transition:"border 0.2s,box-shadow 0.2s"};
  const fo=e=>{e.target.style.borderColor="#0ea5e9";e.target.style.boxShadow="0 0 0 3px rgba(14,165,233,0.12)"};
  const bl=e=>{e.target.style.borderColor="#e2e8f0";e.target.style.boxShadow="none"};

  const titles={login:{h:"Bem-vindo de volta",p:"Acesse sua conta"},register:{h:"Criar nova conta",p:"Preencha seus dados"},edit:{h:"Editar Perfil",p:editFound?"Altere sua foto ou senha":"Digite seu usuário para continuar"}};

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(150deg,#f0f9ff 0%,#fff 35%,#f0fdf4 65%,#fefce8 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Segoe UI',sans-serif",padding:12}}>
      <div className="auth-container" style={{width:"100%",maxWidth:920,display:"flex",borderRadius:24,background:"#fff",boxShadow:"0 4px 6px -1px rgba(0,0,0,0.04),0 25px 60px -15px rgba(0,0,0,0.08)",overflow:"hidden",minHeight:580,border:"1px solid #f1f5f9"}}>
        <div className="auth-left" style={{flex:"0 0 380px",padding:"40px 36px",background:"linear-gradient(160deg,#f0f9ff 0%,#e0f2fe 40%,#f0fdf4 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-40,right:-40,width:140,height:140,borderRadius:"50%",background:"rgba(14,165,233,0.07)"}}/>
          <div style={{position:"absolute",bottom:-30,left:-30,width:100,height:100,borderRadius:"50%",background:"rgba(16,185,129,0.07)"}}/>
          <div className="stethoscope-wrap"><Stetho size={170}/></div>
          <h1 style={{fontSize:28,fontWeight:800,letterSpacing:2.5,margin:"16px 0 6px",background:"linear-gradient(135deg,#0ea5e9,#0d9488)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",textAlign:"center"}}>ASO CONTROLA!</h1>
          <p style={{color:"#64748b",fontSize:13,textAlign:"center",lineHeight:1.7,maxWidth:260}}>Gestão inteligente de Atestados de Saúde Ocupacional</p>
          <div className="features-row" style={{marginTop:24,display:"flex",gap:22,color:"#64748b",fontSize:11}}>
            {[{i:"heart",l:"Saúde"},{i:"alert",l:"Alertas"},{i:"check",l:"Controle"}].map(x=>(
              <div key={x.l} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                <div style={{width:40,height:40,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(14,165,233,0.08)",color:"#0ea5e9"}}><Ico t={x.i} sz={16}/></div>
                <span style={{fontWeight:600}}>{x.l}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="auth-right" style={{flex:1,padding:"40px 40px",display:"flex",flexDirection:"column",justifyContent:"center",overflowY:"auto"}}>
          <div className="auth-tabs" style={{display:"flex",marginBottom:24,background:"#f1f5f9",borderRadius:12,padding:4}}>
            {[["login","ENTRAR"],["register","CADASTRAR"],["edit","EDITAR"]].map(([m,label])=>(
              <button key={m} onClick={()=>switchMode(m)} style={{flex:1,padding:"10px 0",borderRadius:10,border:"none",fontWeight:700,fontSize:13,transition:"all 0.25s",background:mode===m?"#fff":"transparent",color:mode===m?"#0ea5e9":"#94a3b8",boxShadow:mode===m?"0 1px 4px rgba(0,0,0,0.06)":"none"}}>{label}</button>
            ))}
          </div>
          <h2 style={{margin:"0 0 4px",fontSize:22,fontWeight:700,color:"#0f172a"}}>{titles[mode].h}</h2>
          <p style={{margin:"0 0 20px",color:"#94a3b8",fontSize:13}}>{titles[mode].p}</p>

          {mode==="register"&&<div style={{marginBottom:16}}>
            <label style={{color:"#475569",fontSize:13,fontWeight:600,marginBottom:6,display:"block"}}>Tipo de Conta</label>
            <div style={{display:"flex",gap:8}}>
              {[["operacional","Operacional","user"],["senior","Sênior","shield"]].map(([val,label,icon])=>(
                <button key={val} onClick={()=>{setRegType(val);cl()}} style={{flex:1,padding:"10px 14px",borderRadius:12,border:"2px solid "+(regType===val?"#0ea5e9":"#e2e8f0"),background:regType===val?"#f0f9ff":"#fff",display:"flex",alignItems:"center",gap:8,transition:"all 0.2s",color:regType===val?"#0ea5e9":"#64748b"}}>
                  <Ico t={icon} sz={18}/><span style={{fontWeight:600,fontSize:13}}>{label}</span>
                </button>
              ))}
            </div>
          </div>}

          {/* PHOTO UPLOAD (register & edit-found) */}
          {(mode==="register"||(mode==="edit"&&editFound))&&<div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
            <input ref={fotoRef} type="file" accept="image/*" onChange={handleFoto} style={{display:"none"}}/>
            <div className="avatar-upload-wrap" onClick={()=>fotoRef.current?.click()} style={{width:90,height:90,borderRadius:"50%",border:"3px dashed "+(foto?"#0ea5e9":"#cbd5e1"),background:foto?"transparent":"#f8fafc",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",position:"relative",transition:"border-color 0.2s"}}
              onMouseOver={e=>e.currentTarget.style.borderColor="#0ea5e9"} onMouseOut={e=>e.currentTarget.style.borderColor=foto?"#0ea5e9":"#cbd5e1"}>
              {foto?<img src={foto} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} className="avatar-pop"/>
              :<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,color:"#94a3b8"}}>
                <Ico t="camera" sz={24}/><span style={{fontSize:10,fontWeight:600}}>FOTO</span>
              </div>}
              {foto&&<div style={{position:"absolute",bottom:0,right:0,width:26,height:26,borderRadius:"50%",background:"#0ea5e9",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",border:"2px solid #fff"}}><Ico t="camera" sz={12}/></div>}
            </div>
          </div>}

          {err&&<div className="fade-in" style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"10px 14px",marginBottom:14,color:"#dc2626",fontSize:13,fontWeight:500,display:"flex",alignItems:"center",gap:8}}><Ico t="alert" sz={16}/> {err}</div>}
          {ok&&<div className="fade-in" style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"10px 14px",marginBottom:14,color:"#16a34a",fontSize:13,fontWeight:500,display:"flex",alignItems:"center",gap:8}}><Ico t="check" sz={16}/> {ok}</div>}

          {/* USERNAME — always shown for login/register, shown until found for edit */}
          {(mode!=="edit"||!editFound)&&<div style={{marginBottom:14}}>
            <label style={{color:"#475569",fontSize:13,fontWeight:600,marginBottom:6,display:"block"}}>Usuário</label>
            <div style={{position:"relative"}}><span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:"#94a3b8"}}><Ico t="user" sz={18}/></span>
            <input value={user} onChange={e=>{setUser(e.target.value);cl()}} onKeyDown={e=>e.key==="Enter"&&(mode==="login"?doLogin():mode==="register"?doReg():doEditFind())} onFocus={fo} onBlur={bl} placeholder="Nome de usuário" style={ist}/></div>
          </div>}

          {/* EDIT MODE — show user found badge */}
          {mode==="edit"&&editFound&&<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,padding:"10px 16px",background:"#f0f9ff",borderRadius:12,border:"1px solid #bae6fd"}}>
            <Ico t="user" sz={18}/><span style={{fontWeight:600,color:"#0369a1"}}>{user}</span>
            <button onClick={()=>{setEditFound(false);cl()}} style={{marginLeft:"auto",background:"none",border:"none",color:"#94a3b8",cursor:"pointer",padding:4}}><Ico t="x" sz={16}/></button>
          </div>}

          {/* PASSWORD — login & register */}
          {mode!=="edit"&&<div style={{marginBottom:mode==="register"?14:10}}>
            <label style={{color:"#475569",fontSize:13,fontWeight:600,marginBottom:6,display:"block"}}>Senha</label>
            <div style={{position:"relative"}}><span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:"#94a3b8"}}><Ico t="lock" sz={18}/></span>
            <input type={sp?"text":"password"} value={pass} onChange={e=>{setPass(e.target.value);cl()}} onKeyDown={e=>e.key==="Enter"&&(mode==="login"?doLogin():doReg())} onFocus={fo} onBlur={bl} placeholder={mode==="register"?"Mínimo 4 caracteres":"Sua senha"} style={{...ist,paddingRight:46}}/>
            <button onClick={()=>setSp(!sp)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#94a3b8",padding:4}}><Ico t={sp?"eyeOff":"eye"} sz={18}/></button></div>
          </div>}
          {mode==="register"&&<div style={{marginBottom:14}}>
            <label style={{color:"#475569",fontSize:13,fontWeight:600,marginBottom:6,display:"block"}}>Confirmar Senha</label>
            <div style={{position:"relative"}}><span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:"#94a3b8"}}><Ico t="lock" sz={18}/></span>
            <input type={sp?"text":"password"} value={pc} onChange={e=>{setPc(e.target.value);cl()}} onKeyDown={e=>e.key==="Enter"&&doReg()} onFocus={fo} onBlur={bl} placeholder="Repita a senha" style={ist}/></div>
          </div>}

          {mode==="register"&&regType==="senior"&&<div style={{marginBottom:14}}>
            <label style={{color:"#475569",fontSize:13,fontWeight:600,marginBottom:6,display:"block"}}>Senha de Autorização Sênior</label>
            <div style={{position:"relative"}}><span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:"#d97706"}}><Ico t="shield" sz={18}/></span>
            <input type="password" value={seniorPass} onChange={e=>{setSeniorPass(e.target.value);cl()}} onKeyDown={e=>e.key==="Enter"&&doReg()} onFocus={fo} onBlur={bl} placeholder="Senha de autorização" style={{...ist,borderColor:"#fbbf24"}}/></div>
            <p style={{fontSize:11,color:"#d97706",marginTop:4}}>Necessária para criar conta Sênior</p>
          </div>}

          {/* EDIT MODE — new password fields (after user found) */}
          {mode==="edit"&&editFound&&<>
            <div style={{marginBottom:14}}>
              <label style={{color:"#475569",fontSize:13,fontWeight:600,marginBottom:6,display:"block"}}>Nova Senha <span style={{fontWeight:400,color:"#94a3b8"}}>(deixe vazio para manter a atual)</span></label>
              <div style={{position:"relative"}}><span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:"#94a3b8"}}><Ico t="lock" sz={18}/></span>
              <input type={sp?"text":"password"} value={editNewPass} onChange={e=>{setEditNewPass(e.target.value);cl()}} onFocus={fo} onBlur={bl} placeholder="Nova senha (mín. 4 caracteres)" style={{...ist,paddingRight:46}}/>
              <button onClick={()=>setSp(!sp)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#94a3b8",padding:4}}><Ico t={sp?"eyeOff":"eye"} sz={18}/></button></div>
            </div>
            {editNewPass&&<div style={{marginBottom:14}}>
              <label style={{color:"#475569",fontSize:13,fontWeight:600,marginBottom:6,display:"block"}}>Confirmar Nova Senha</label>
              <div style={{position:"relative"}}><span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:"#94a3b8"}}><Ico t="lock" sz={18}/></span>
              <input type={sp?"text":"password"} value={editNewPc} onChange={e=>{setEditNewPc(e.target.value);cl()}} onKeyDown={e=>e.key==="Enter"&&doEditSave()} onFocus={fo} onBlur={bl} placeholder="Repita a nova senha" style={ist}/></div>
            </div>}
          </>}

          {/* ACTION BUTTONS */}
          {mode==="login"&&<button onClick={doLogin} style={{width:"100%",padding:"13px 0",borderRadius:12,border:"none",marginTop:16,background:"linear-gradient(135deg,#0ea5e9,#0d9488)",color:"#fff",fontWeight:700,fontSize:15,boxShadow:"0 4px 16px rgba(14,165,233,0.3)",transition:"transform 0.15s,box-shadow 0.15s"}} onMouseOver={e=>{e.target.style.transform="translateY(-1px)"}} onMouseOut={e=>{e.target.style.transform=""}}>ENTRAR</button>}
          {mode==="register"&&<button onClick={doReg} style={{width:"100%",padding:"13px 0",borderRadius:12,border:"none",marginTop:16,background:"linear-gradient(135deg,#0ea5e9,#0d9488)",color:"#fff",fontWeight:700,fontSize:15,boxShadow:"0 4px 16px rgba(14,165,233,0.3)",transition:"transform 0.15s,box-shadow 0.15s"}} onMouseOver={e=>{e.target.style.transform="translateY(-1px)"}} onMouseOut={e=>{e.target.style.transform=""}}>CRIAR CONTA</button>}

function LogPanel({t}){

  const logs=useMemo(()=>{
    if(!logsObj)return[];
    return Object.values(logsObj).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
  },[logsObj]);

  const filtered=logs.filter(l=>{
    if(filter!=="all"&&!l.action.toLowerCase().includes(filter))return false;
    if(search){const q=search.toLowerCase();return l.user.toLowerCase().includes(q)||l.detail.toLowerCase().includes(q)||l.action.toLowerCase().includes(q)}

function Dash({currentUser,userFoto,userRole,onLogout,onUpdateFoto}){

    const newVal=typeof updater==="function"?updater(recsArr):updater;

  };
  const[search,setSearch]=useState("");const[showForm,setShowForm]=useState(false);

  const[nome,setNome]=useState("");const[prof,setProf]=useState("");const[dAso,setDAso]=useState("");const[recFoto,setRecFoto]=useState("");

  const[showPal,setShowPal]=useState(false);const[showDel,setShowDel]=useState(false);
  const[confirmDelOne,setConfirmDelOne]=useState(null);const[confirmDelSel,setConfirmDelSel]=useState(false);
  const[editRec,setEditRec]=useState(null);const[editData,setEditData]=useState({nome:"",profissao:"",dataAso:"",foto:""});
  const editFotoRef=useRef();
  const[showProfile,setShowProfile]=useState(false);
  const[profNewPass,setProfNewPass]=useState("");const[profNewPc,setProfNewPc]=useState("");const[profFoto,setProfFoto]=useState(userFoto);
  const[profErr,setProfErr]=useState("");const[profOk,setProfOk]=useState("");const[profSp,setProfSp]=useState(false);
  const profFotoRef=useRef();

  const handleProfFoto=async e=>{const file=e.target.files?.[0];if(!file)return;const b=await readFileAsBase64(file,200);setProfFoto(b);e.target.value=""};
  const saveProfProfile=async()=>{
    const k=fbKey(currentUser.toLowerCase());
    try{
      const userData=await dbGet("users/"+k);
      if(!userData){setProfErr("Erro ao encontrar usuário");return}
      let changed=[];
      if(profFoto!==(userData.foto||"")){userData.foto=profFoto;changed.push("foto");onUpdateFoto(profFoto)}
      if(profNewPass.trim()){
        if(profNewPass.length<4){setProfErr("Nova senha deve ter pelo menos 4 caracteres");return}
        if(profNewPass!==profNewPc){setProfErr("As senhas não coincidem");return}
        userData.pass=profNewPass;changed.push("senha");
      }
      if(changed.length===0){setProfErr("Nenhuma alteração detectada");return}
      await dbSet("users/"+k,userData);
      addLog("EDITOU PERFIL",currentUser,"Alterou: "+changed.join(", "));
      setProfOk("Perfil atualizado!");
      setTimeout(()=>setShowProfile(false),1200);
    }catch(e){setProfErr("Erro de conexão. Verifique sua internet.")}
  };
  const[sortBy,setSortBy]=useState("nome");const[sortDir,setSortDir]=useState("asc");
  const[filterName,setFilterName]=useState("");const[nameSearch,setNameSearch]=useState("");const[showNameDrop,setShowNameDrop]=useState(false);
  const[isFullscreen,setIsFullscreen]=useState(false);
  const[inlineAdd,setInlineAdd]=useState(false);const[inNome,setInNome]=useState("");const[inProf,setInProf]=useState("");const[inDAso,setInDAso]=useState("");
  const fRef=useRef();const recFotoRef=useRef();const tableRef=useRef();

  useEffect(()=>{localStorage.setItem("aso_theme",tn)},[tn]);

  /* FIX: apply theme bg to body */
  useEffect(()=>{
    document.body.style.background=t.bg;
    document.body.style.transition="background 0.3s";
    return()=>{document.body.style.background=""};
  },[t.bg]);

  const handleRecFoto=async e=>{const file=e.target.files?.[0];if(!file)return;const b=await readFileAsBase64(file,120);setRecFoto(b);e.target.value=""};

  const addRec=()=>{
    if(!nome.trim()||!dAso.trim())return;
    setRecs(p=>[...p,{nome:nome.trim(),profissao:prof.trim(),dataAso:dAso.trim(),foto:""}]);
    addLog("ADICIONOU REGISTRO",currentUser,nome.trim()+" — "+dAso.trim());
    setNome("");setProf("");setDAso("");setShowForm(false);
  };
  const delSel=()=>{
    const names=recsArr.filter((_,i)=>sel.has(i)).map(r=>r.nome).join(", ");
    setRecs(p=>p.filter((_,i)=>!sel.has(i)));
    addLog("EXCLUIU REGISTROS",currentUser,sel.size+" registro(s): "+names);
    setSel(new Set());setConfirmDelSel(false);
  };
  const delAll=()=>{
    addLog("LIMPOU TUDO",currentUser,recsArr.length+" registros removidos");
    setRecs([]);setSel(new Set());setShowDel(false);
  };
  const delOne=(idx)=>{
    const r=recsArr[idx];
    addLog("EXCLUIU REGISTRO",currentUser,r.nome+" — "+r.dataAso);
    setRecs(p=>p.filter((_,i)=>i!==idx));
    const ns=new Set(sel);ns.delete(idx);setSel(ns);setConfirmDelOne(null);
  };

  /* EDIT RECORD */
  const startEdit=(idx)=>{
    const r=recsArr[idx];
    setEditRec(idx);
    setEditData({nome:r.nome,profissao:r.profissao,dataAso:r.dataAso,foto:r.foto||""});
  };
  const handleEditFoto=async e=>{const file=e.target.files?.[0];if(!file)return;const b=await readFileAsBase64(file,120);setEditData(d=>({...d,foto:b}));e.target.value=""};
  const saveEdit=()=>{
    if(!editData.nome.trim()||!editData.dataAso.trim())return;
    setRecs(p=>p.map((r,i)=>i===editRec?{...r,nome:editData.nome.trim(),profissao:editData.profissao.trim(),dataAso:editData.dataAso.trim(),foto:editData.foto}:r));
    addLog("EDITOU REGISTRO",currentUser,editData.nome.trim()+" — "+editData.dataAso.trim());
    setEditRec(null);
  };

  const handleFile=useCallback(async e=>{
    const file=e.target.files?.[0];if(!file)return;
    try{const data=await file.arrayBuffer();const wb=XLSX.read(data);const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{raw:false});
      const nr=json.map(row=>{const ks=Object.keys(row);return{nome:(row[ks.find(k=>k.toLowerCase().includes("nome"))||ks[0]]||"").trim(),profissao:(row[ks.find(k=>k.toLowerCase().includes("profiss")||k.toLowerCase().includes("cargo"))||ks[1]]||"").trim(),dataAso:(row[ks.find(k=>k.toLowerCase().includes("data")||k.toLowerCase().includes("aso"))||ks[2]]||"").trim(),foto:""}}).filter(r=>r.nome);
      setRecs(p=>[...p,...nr]);
      addLog("IMPORTOU ARQUIVO",currentUser,nr.length+" registros importados de "+file.name);
    }catch{alert("Erro ao ler arquivo.")}e.target.value="";
  },[currentUser]);

  const exportCSV=()=>{const csv="NOME,PROFISSÃO,DATA ASO\n"+recsArr.map(r=>'"'+r.nome+'","'+r.profissao+'","'+r.dataAso+'"').join("\n");const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="aso_controla_export.csv";a.click();URL.revokeObjectURL(url)};

  const filtered=useMemo(()=>{
    let list=recsArr.map((r,i)=>({...r,_i:i}));
    if(filterName){const fn=norm(filterName);list=list.filter(r=>norm(r.nome)===fn)}
    if(dateFrom){const df=parseDate(fromISO(dateFrom));if(df){list=list.filter(r=>{const d=parseDate(r.dataAso);return d&&d>=df})}}
    if(dateTo){const dt=parseDate(fromISO(dateTo));if(dt){dt.setHours(23,59,59);list=list.filter(r=>{const d=parseDate(r.dataAso);return d&&d<=dt})}}
    if(view==="critical")list=list.filter(r=>daysUntil(r.dataAso)<=2);
    else if(view==="warning")list=list.filter(r=>daysUntil(r.dataAso)<=7);
    else if(view==="month")list=list.filter(r=>{const d=daysUntil(r.dataAso);return d>7&&d<=30});
    else if(view==="ok")list=list.filter(r=>daysUntil(r.dataAso)>30);
    list.sort((a,b)=>{let va,vb;if(sortBy==="dataAso"){va=parseDate(a.dataAso)||new Date(0);vb=parseDate(b.dataAso)||new Date(0)}else{va=a[sortBy]?.toLowerCase()||"";vb=b[sortBy]?.toLowerCase()||""}return va<vb?(sortDir==="asc"?-1:1):va>vb?(sortDir==="asc"?1:-1):0});
    return list;
  },[recsArr,filterName,dateFrom,dateTo,view,sortBy,sortDir]);

  const stats=useMemo(()=>{let c=0,w=0,m=0,o=0;recsArr.forEach(r=>{const d=daysUntil(r.dataAso);if(d<=2)c++;else if(d<=7)w++;else if(d<=30)m++;else o++});return{c,w,m,o,total:recsArr.length}},[recsArr]);
  const hasAlert=useMemo(()=>recsArr.some(r=>daysUntil(r.dataAso)<=7),[recsArr]);

  /* Unique names for filter */
  const uniqueNames=useMemo(()=>[...new Set(recsArr.map(r=>r.nome))].sort(),[recsArr]);
  const filteredNames=useMemo(()=>{
    if(!nameSearch.trim())return uniqueNames;
    const q=norm(nameSearch);
    return uniqueNames.filter(n=>norm(n).includes(q));
  },[uniqueNames,nameSearch]);

  /* Fullscreen toggle */
  const toggleFullscreen=()=>{
    if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{});setIsFullscreen(true)}
    else{document.exitFullscreen();setIsFullscreen(false)}

  useEffect(()=>{

    document.addEventListener("fullscreenchange",handler);
    return()=>document.removeEventListener("fullscreenchange",handler);
  },[]);

  /* Inline add row */
  const addInline=()=>{
    if(!inNome.trim()||!inDAso.trim())return;
    setRecs(p=>[...p,{nome:inNome.trim(),profissao:inProf.trim(),dataAso:inDAso.trim(),foto:""}]);
    addLog("ADICIONOU REGISTRO",currentUser,inNome.trim()+" — "+inDAso.trim());
    setInNome("");setInProf("");setInDAso("");
  };

  const togSort=col=>{if(sortBy===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortBy(col);setSortDir("asc")}};
  const SA=({col})=>sortBy===col?<span style={{marginLeft:4,fontSize:10}}>{sortDir==="asc"?"▲":"▼"}</span>:null;
  const bs=(bg,cl)=>({padding:"8px 16px",borderRadius:8,border:"none",fontWeight:600,fontSize:13,display:"inline-flex",alignItems:"center",gap:6,background:bg,color:cl,transition:"all 0.15s"});
  const is={padding:"10px 14px",borderRadius:8,border:"1px solid "+t.border,background:t.input,color:t.text,fontSize:14,outline:"none",width:"100%",boxSizing:"border-box"};

  const roleColor=isSenior?"#d97706":"#0ea5e9";
  const roleLabel=isSenior?"SÊNIOR":"OPERACIONAL";

  const navTabs=[
    {id:"dashboard",label:"Dashboard",icon:"list"},
    ...(isSenior?[
      {id:"users",label:"Usuários",icon:"users"},
      {id:"logs",label:"Movimentações",icon:"activity"},
    ]:[]),
  ];

  return(
    <div style={{minHeight:"100vh",background:t.bg,color:t.text,fontFamily:"'Segoe UI',sans-serif",transition:"background 0.3s"}}>
      <header className="header-bar" style={{background:t.card,borderBottom:"1px solid "+t.border,padding:"10px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,0.15)",gap:8}}>
        <div className="header-left" style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,"+t.accent+","+t.accent+"88)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 3px 12px "+t.accent+"33",color:"#fff",flexShrink:0}}><Ico t="heart" sz={16}/></div>
          <span style={{fontWeight:800,fontSize:17,letterSpacing:1.5,color:t.accent,whiteSpace:"nowrap"}}>ASO CONTROLA!</span>
        </div>
        <div className="header-right" style={{display:"flex",alignItems:"center",gap:10,flexWrap:"nowrap"}}>
          <div className="siren-box" style={{display:"flex",alignItems:"center",gap:8,padding:"4px 14px 4px 8px",borderRadius:12,background:hasAlert?"rgba(255,23,68,0.08)":t.input,border:"1px solid "+(hasAlert?"rgba(255,23,68,0.2)":t.border),cursor:"pointer",transition:"all 0.3s",flexShrink:0}} onClick={()=>{if(hasAlert){setView("critical");setTab("dashboard");setTimeout(()=>tableRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),100)}}}>
            <Siren active={hasAlert} size={36}/>
            <div className="siren-text" style={{display:"flex",flexDirection:"column",lineHeight:1.2}}>
              <span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:hasAlert?"#ff1744":t.muted}}>{hasAlert?"ALERTA!":"Sem alertas"}</span>
              <span style={{fontSize:11,color:hasAlert?"#ff5252":t.muted}}>{hasAlert?(stats.c+stats.w)+" vencendo":"Tudo em dia"}</span>
            </div>
          </div>
          <div style={{position:"relative"}}>
            <button onClick={()=>setShowPal(!showPal)} style={{...bs(t.input,t.text),border:"1px solid "+t.border,padding:"7px 12px"}}><Ico t="palette" sz={16}/><span className="theme-btn-text" style={{fontSize:12}}>{tn}</span></button>
            {showPal&&<><div style={{position:"fixed",inset:0,zIndex:199}} onClick={()=>setShowPal(false)}/><div style={{position:"absolute",right:0,top:"110%",background:t.card,border:"1px solid "+t.border,borderRadius:12,padding:10,zIndex:200,boxShadow:"0 10px 40px rgba(0,0,0,0.35)",minWidth:200}}>
              {Object.entries(THEMES).map(([n,th])=>(<button key={n} onClick={()=>{setTn(n);setShowPal(false)}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"8px 12px",border:"none",borderRadius:8,marginBottom:3,background:n===tn?th.accent+"22":"transparent",color:n===tn?th.accent:t.text,cursor:"pointer"}}><div style={{width:20,height:20,borderRadius:6,background:"linear-gradient(135deg,"+th.bg+","+th.accent+")",border:"2px solid "+th.accent,flexShrink:0}}/><span style={{fontSize:13,fontWeight:n===tn?700:400}}>{n}</span></button>))}
            </div></>}
          </div>
          <div onClick={()=>{setShowProfile(true);setProfFoto(userFoto);setProfNewPass("");setProfNewPc("");setProfErr("");setProfOk("");setProfSp(false)}} style={{padding:"4px 10px",borderRadius:8,background:t.input,border:"1px solid "+t.border,display:"flex",alignItems:"center",gap:6,flexShrink:0,cursor:"pointer",transition:"border-color 0.2s"}} onMouseOver={e=>e.currentTarget.style.borderColor=t.accent} onMouseOut={e=>e.currentTarget.style.borderColor=t.border}>
            <Avatar src={userFoto} name={currentUser} size={26} accent={t.accent}/>
            <span className="user-badge-text" style={{fontSize:12,color:t.muted}}>{currentUser}</span>
            <span style={{fontSize:9,fontWeight:700,color:roleColor,background:roleColor+"18",padding:"2px 6px",borderRadius:4,marginLeft:2}}>{roleLabel}</span>
          </div>
          <button onClick={()=>{addLog("LOGOUT",currentUser,"Saiu do sistema");onLogout()}} style={{...bs("rgba(220,38,38,0.12)","#ef4444"),padding:"7px 12px",flexShrink:0}}><Ico t="logout" sz={16}/></button>
        </div>
      </header>

      {/* NAV TABS */}
      {isSenior&&<div className="nav-tabs-bar" style={{background:t.card+"cc",borderBottom:"1px solid "+t.border,padding:"0 24px",display:"flex",gap:0,position:"sticky",top:56,zIndex:99}}>
        {navTabs.map(nt=>(
          <button key={nt.id} onClick={()=>setTab(nt.id)} style={{padding:"12px 20px",border:"none",borderBottom:"3px solid "+(tab===nt.id?t.accent:"transparent"),background:"transparent",color:tab===nt.id?t.accent:t.muted,fontWeight:tab===nt.id?700:500,fontSize:13,display:"flex",alignItems:"center",gap:6,transition:"all 0.2s",cursor:"pointer"}}><Ico t={nt.icon} sz={15}/>{nt.label}</button>
        ))}
      </div>}

      <main className="main-content" style={{maxWidth:1100,margin:"0 auto",padding:24}}>

        {tab==="users"&&isSenior&&<UsersPanel t={t} currentUser={currentUser}/>}
        {tab==="logs"&&isSenior&&<LogPanel t={t}/>}

        {tab==="dashboard"&&<>
        {hasAlert&&<div className="banner-alert banner-slide" style={{background:"linear-gradient(135deg,rgba(255,23,68,0.08),rgba(255,152,0,0.06))",border:"1px solid rgba(255,23,68,0.2)",borderRadius:14,padding:"16px 22px",marginBottom:20,display:"flex",alignItems:"center",gap:18,flexWrap:"wrap"}}>
          <div className="banner-siren"><Siren active={true} size={52}/></div>
          <div style={{flex:1,minWidth:180}}>
            <div className="banner-text" style={{fontWeight:700,fontSize:15,color:"#ff1744",marginBottom:4}}>ATENÇÃO — ASOs com vencimento próximo!</div>
            <div style={{fontSize:13,color:t.muted,lineHeight:1.5}}>
              {stats.c>0&&<span style={{color:"#ff1744",fontWeight:600}}>{stats.c} crítico(s) (≤2d)</span>}
              {stats.c>0&&stats.w>0&&" · "}
              {stats.w>0&&<span style={{color:"#d97706",fontWeight:600}}>{stats.w} atenção (≤7d)</span>}
            </div>
          </div>
          <button className="banner-btn" onClick={()=>{setView("critical");setTimeout(()=>tableRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),100)}} style={{...bs("#ff1744","#fff"),padding:"8px 18px",whiteSpace:"nowrap",flexShrink:0}}>Ver Críticos</button>
        </div>}

        <div className="stats-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:14,marginBottom:24}}>
          {[{l:"Total",v:stats.total,color:t.accent,i:"list",f:"all"},{l:"Crítico (≤2d)",v:stats.c,color:"#dc2626",i:"alert",f:"critical"},{l:"Atenção (≤7d)",v:stats.c+stats.w,color:"#d97706",i:"alert",f:"warning"},{l:"Próximo (≤30d)",v:stats.m,color:"#2563eb",i:"calendar",f:"month"},{l:"Regular (>30d)",v:stats.o,color:"#16a34a",i:"check",f:"ok"}].map(s=>(
            <button key={s.f} onClick={()=>{setView(s.f);setTimeout(()=>tableRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),100)}} style={{background:view===s.f?s.color+"22":t.card,border:"1px solid "+(view===s.f?s.color:t.border),borderRadius:14,padding:"16px 18px",textAlign:"left",transition:"all 0.2s",cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span className="stat-label" style={{color:t.muted,fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>{s.l}</span><span style={{color:s.color}}><Ico t={s.i} sz={18}/></span></div>
              <div className="stat-value" style={{fontSize:32,fontWeight:800,color:s.color,marginTop:6}}>{s.v}</div>
            </button>
          ))}
        </div>

        <div className="toolbar" style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:20,alignItems:"center",background:t.card,padding:"14px 18px",borderRadius:14,border:"1px solid "+t.border}}>
          {/* NAME AUTOCOMPLETE */}
          <div style={{position:"relative",flex:"1 1 200px"}}>
            <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:t.muted,zIndex:1}}><Ico t="user" sz={16}/></span>
            <input value={filterName||nameSearch} onChange={e=>{setNameSearch(e.target.value);setFilterName("");setShowNameDrop(true)}} onFocus={()=>setShowNameDrop(true)} placeholder="Buscar por nome..." style={{...is,paddingLeft:36,paddingRight:filterName?32:14}}/>
            {filterName&&<button onClick={()=>{setFilterName("");setNameSearch("")}} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:t.muted,cursor:"pointer",padding:2,display:"flex"}}><Ico t="x" sz={15}/></button>}
            {showNameDrop&&!filterName&&<><div style={{position:"fixed",inset:0,zIndex:199}} onClick={()=>setShowNameDrop(false)}/><div style={{position:"absolute",left:0,right:0,top:"110%",background:t.card,border:"1px solid "+t.border,borderRadius:10,padding:4,zIndex:200,boxShadow:"0 10px 30px rgba(0,0,0,0.3)",maxHeight:220,overflowY:"auto"}}>
              {filteredNames.length===0?<div style={{padding:"10px 14px",fontSize:13,color:t.muted}}>Nenhum nome encontrado</div>
              :filteredNames.map(n=><button key={n} onClick={()=>{setFilterName(n);setNameSearch("");setShowNameDrop(false)}} style={{display:"block",width:"100%",padding:"8px 14px",border:"none",borderRadius:6,background:"transparent",color:t.text,fontSize:13,textAlign:"left",cursor:"pointer",transition:"background 0.15s"}} onMouseOver={e=>e.currentTarget.style.background=t.accent+"18"} onMouseOut={e=>e.currentTarget.style.background="transparent"}>{n}</button>)}
            </div></>}
          </div>
          {/* DATE RANGE */}
          <div className="search-wrap" style={{display:"flex",alignItems:"center",gap:6,flex:"0 1 auto"}}>
            <span style={{fontSize:11,color:t.muted,fontWeight:600,whiteSpace:"nowrap"}}>De:</span>
            <div style={{position:"relative"}}>
              <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{...is,padding:"8px 10px",fontSize:13,width:140,cursor:"pointer"}}/>
            </div>
            <span style={{fontSize:11,color:t.muted,fontWeight:600,whiteSpace:"nowrap"}}>Até:</span>
            <div style={{position:"relative"}}>
              <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{...is,padding:"8px 10px",fontSize:13,width:140,cursor:"pointer"}}/>
            </div>
            {(dateFrom||dateTo)&&<button onClick={()=>{setDateFrom("");setDateTo("")}} title="Limpar período" style={{background:"none",border:"none",color:t.muted,cursor:"pointer",padding:2,display:"flex"}}><Ico t="x" sz={16}/></button>}
          </div>
          <button onClick={()=>setShowForm(!showForm)} style={bs(t.accent,"#fff")}><Ico t="plus" sz={16}/><span className="btn-label">Novo</span></button>
          <input ref={fRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{display:"none"}}/>
          <button onClick={()=>fRef.current?.click()} style={bs(t.accent+"22",t.accent)}><Ico t="upload" sz={16}/><span className="btn-label">Importar</span></button>
          <button onClick={exportCSV} style={bs(t.input,t.text)}><Ico t="download" sz={16}/><span className="btn-label">Exportar</span></button>
          <button onClick={toggleFullscreen} title={isFullscreen?"Sair da tela cheia":"Tela cheia"} style={bs(t.input,t.text)}><Ico t={isFullscreen?"minimize":"maximize"} sz={16}/></button>
          {sel.size>0&&<button onClick={()=>setConfirmDelSel(true)} style={bs("rgba(220,38,38,0.15)","#ef4444")}><Ico t="trash" sz={16}/> {sel.size}</button>}
          <button onClick={()=>setShowDel(true)} style={bs("rgba(220,38,38,0.08)","#ef4444")}><Ico t="trash" sz={16}/><span className="btn-label">Limpar</span></button>
        </div>
        {/* Active filters display */}
        {(filterName||dateFrom||dateTo)&&<div style={{marginBottom:14,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:t.muted}}>Filtros:</span>
          {filterName&&<span style={{fontSize:13,fontWeight:600,color:t.accent,background:t.accent+"18",padding:"4px 12px",borderRadius:20,display:"inline-flex",alignItems:"center",gap:6}}><Ico t="user" sz={12}/>{filterName}<button onClick={()=>{setFilterName("");setNameSearch("")}} style={{background:"none",border:"none",color:t.accent,cursor:"pointer",padding:0,display:"flex"}}><Ico t="x" sz={14}/></button></span>}
          {(dateFrom||dateTo)&&<span style={{fontSize:13,fontWeight:600,color:"#d97706",background:"rgba(217,119,6,0.12)",padding:"4px 12px",borderRadius:20,display:"inline-flex",alignItems:"center",gap:6}}><Ico t="calendar" sz={12}/>{dateFrom?fromISO(dateFrom):"..."} → {dateTo?fromISO(dateTo):"..."}<button onClick={()=>{setDateFrom("");setDateTo("")}} style={{background:"none",border:"none",color:"#d97706",cursor:"pointer",padding:0,display:"flex"}}><Ico t="x" sz={14}/></button></span>}
        </div>}

        {showDel&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setShowDel(false)}><div className="fade-in" onClick={e=>e.stopPropagation()} style={{background:t.card,borderRadius:16,padding:30,maxWidth:400,width:"100%",border:"1px solid "+t.border,boxShadow:"0 20px 50px rgba(0,0,0,0.4)"}}><h3 style={{color:"#ef4444",margin:"0 0 12px",display:"flex",alignItems:"center",gap:8}}><Ico t="alert" sz={20}/> Excluir Todos os Registros?</h3><p style={{color:t.muted,fontSize:14,margin:"0 0 8px"}}>Todos os <strong style={{color:t.text}}>{recsArr.length}</strong> registros serão removidos permanentemente.</p><p style={{color:"#ef4444",fontSize:13,margin:"0 0 24px",fontWeight:500}}>Esta ação não pode ser desfeita.</p><div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><button onClick={()=>setShowDel(false)} style={bs(t.input,t.text)}>Cancelar</button><button onClick={delAll} style={bs("#dc2626","#fff")}><Ico t="trash" sz={14}/> Excluir Tudo</button></div></div></div>}

        {/* CONFIRM DELETE ONE */}
        {confirmDelOne!==null&&recsArr[confirmDelOne]&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setConfirmDelOne(null)}>
          <div className="fade-in" onClick={e=>e.stopPropagation()} style={{background:t.card,borderRadius:16,padding:30,maxWidth:400,width:"100%",border:"1px solid "+t.border,boxShadow:"0 20px 50px rgba(0,0,0,0.4)"}}>
            <h3 style={{color:"#ef4444",margin:"0 0 12px",display:"flex",alignItems:"center",gap:8}}><Ico t="alert" sz={20}/> Excluir Registro?</h3>
            <div style={{background:t.input,borderRadius:10,padding:"12px 16px",marginBottom:20,border:"1px solid "+t.border}}>
              <div style={{fontWeight:600,fontSize:15}}>{recsArr[confirmDelOne].nome}</div>
              <div style={{fontSize:13,color:t.muted,marginTop:4}}>{recsArr[confirmDelOne].profissao} — {recsArr[confirmDelOne].dataAso}</div>
            </div>
            <p style={{color:t.muted,fontSize:13,margin:"0 0 20px"}}>Tem certeza que deseja excluir este registro? Esta ação não pode ser desfeita.</p>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><button onClick={()=>setConfirmDelOne(null)} style={bs(t.input,t.text)}>Cancelar</button><button onClick={()=>delOne(confirmDelOne)} style={bs("#dc2626","#fff")}><Ico t="trash" sz={14}/> Excluir</button></div>
          </div>
        </div>}

        {/* CONFIRM DELETE SELECTED */}
        {confirmDelSel&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setConfirmDelSel(false)}>
          <div className="fade-in" onClick={e=>e.stopPropagation()} style={{background:t.card,borderRadius:16,padding:30,maxWidth:400,width:"100%",border:"1px solid "+t.border,boxShadow:"0 20px 50px rgba(0,0,0,0.4)"}}>
            <h3 style={{color:"#ef4444",margin:"0 0 12px",display:"flex",alignItems:"center",gap:8}}><Ico t="alert" sz={20}/> Excluir {sel.size} Registro(s)?</h3>
            <div style={{background:t.input,borderRadius:10,padding:"12px 16px",marginBottom:16,border:"1px solid "+t.border,maxHeight:120,overflowY:"auto"}}>
              {recsArr.filter((_,i)=>sel.has(i)).map((r,i)=><div key={i} style={{fontSize:13,padding:"3px 0",color:t.text}}>{r.nome} <span style={{color:t.muted}}>— {r.dataAso}</span></div>)}
            </div>
            <p style={{color:t.muted,fontSize:13,margin:"0 0 20px"}}>Tem certeza que deseja excluir os registros selecionados? Esta ação não pode ser desfeita.</p>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><button onClick={()=>setConfirmDelSel(false)} style={bs(t.input,t.text)}>Cancelar</button><button onClick={delSel} style={bs("#dc2626","#fff")}><Ico t="trash" sz={14}/> Excluir {sel.size}</button></div>
          </div>
        </div>}

        {/* EDIT RECORD MODAL */}
        {editRec!==null&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setEditRec(null)}>
          <div className="fade-in profile-modal-inner" onClick={e=>e.stopPropagation()} style={{background:t.card,borderRadius:16,padding:30,maxWidth:460,width:"100%",border:"1px solid "+t.border,boxShadow:"0 20px 50px rgba(0,0,0,0.4)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <h3 style={{margin:0,fontSize:18,fontWeight:700,color:t.accent,display:"flex",alignItems:"center",gap:8}}><Ico t="edit" sz={20}/> Editar Registro</h3>
              <button onClick={()=>setEditRec(null)} style={{background:"none",border:"none",color:t.muted,padding:4,cursor:"pointer"}}><Ico t="x" sz={20}/></button>
            </div>
            <div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
              <input ref={editFotoRef} type="file" accept="image/*" onChange={handleEditFoto} style={{display:"none"}}/>
              <div onClick={()=>editFotoRef.current?.click()} style={{width:70,height:70,borderRadius:"50%",border:"2px dashed "+(editData.foto?t.accent:t.border),background:editData.foto?"transparent":t.input,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",position:"relative",transition:"border-color 0.2s"}}
                onMouseOver={e=>e.currentTarget.style.borderColor=t.accent} onMouseOut={e=>e.currentTarget.style.borderColor=editData.foto?t.accent:t.border}>
                {editData.foto?<img src={editData.foto} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<Ico t="camera" sz={22}/>}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
              <div>
                <label style={{color:t.muted,fontSize:11,fontWeight:600,textTransform:"uppercase",display:"block",marginBottom:4}}>Nome *</label>
                <input value={editData.nome} onChange={e=>setEditData(d=>({...d,nome:e.target.value}))} style={is} onKeyDown={e=>e.key==="Enter"&&saveEdit()}/>
              </div>
              <div>
                <label style={{color:t.muted,fontSize:11,fontWeight:600,textTransform:"uppercase",display:"block",marginBottom:4}}>Profissão</label>
                <input value={editData.profissao} onChange={e=>setEditData(d=>({...d,profissao:e.target.value}))} style={is} onKeyDown={e=>e.key==="Enter"&&saveEdit()}/>
              </div>
              <div>
                <label style={{color:t.muted,fontSize:11,fontWeight:600,textTransform:"uppercase",display:"block",marginBottom:4}}>Data ASO *</label>
                <div style={{display:"flex",gap:4,alignItems:"center"}}>
                  <input value={editData.dataAso} onChange={e=>setEditData(d=>({...d,dataAso:e.target.value}))} style={{...is,flex:1}} onKeyDown={e=>e.key==="Enter"&&saveEdit()}/>
                  <div style={{position:"relative",flexShrink:0}}>
                    <input type="date" value={toISO(editData.dataAso)} onChange={e=>setEditData(d=>({...d,dataAso:fromISO(e.target.value)}))} style={{position:"absolute",inset:0,opacity:0,cursor:"pointer",width:"100%",height:"100%"}}/>
                    <div style={{width:36,height:36,borderRadius:8,background:t.input,border:"1px solid "+t.border,display:"flex",alignItems:"center",justifyContent:"center",color:t.muted,cursor:"pointer"}}><Ico t="calendar" sz={16}/></div>
                  </div>
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setEditRec(null)} style={{...bs(t.input,t.text),flex:1,justifyContent:"center",padding:"10px 0"}}>Cancelar</button>
              <button onClick={saveEdit} style={{...bs(t.accent,"#fff"),flex:1,justifyContent:"center",padding:"10px 0"}}><Ico t="check" sz={14}/> Salvar</button>
            </div>
          </div>
        </div>}

        {showForm&&<div className="form-card fade-in" style={{background:t.card,borderRadius:14,padding:20,marginBottom:20,border:"1px solid "+t.accent+"44"}}>
          <h3 style={{color:t.accent,margin:"0 0 16px",fontSize:15,fontWeight:700}}>+ Novo Registro</h3>
          <div className="form-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:14,alignItems:"end"}}>
            <div><label style={{color:t.muted,fontSize:11,fontWeight:600,textTransform:"uppercase",display:"block",marginBottom:4}}>Nome *</label><input value={nome} onChange={e=>setNome(e.target.value)} placeholder="Nome completo" style={is} onKeyDown={e=>e.key==="Enter"&&addRec()}/></div>
            <div><label style={{color:t.muted,fontSize:11,fontWeight:600,textTransform:"uppercase",display:"block",marginBottom:4}}>Profissão</label><input value={prof} onChange={e=>setProf(e.target.value)} placeholder="Ex: Engenheiro" style={is} onKeyDown={e=>e.key==="Enter"&&addRec()}/></div>
            <div><label style={{color:t.muted,fontSize:11,fontWeight:600,textTransform:"uppercase",display:"block",marginBottom:4}}>Data ASO *</label>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                <input value={dAso} onChange={e=>setDAso(e.target.value)} placeholder="dd/mm/aaaa" style={{...is,flex:1}} onKeyDown={e=>e.key==="Enter"&&addRec()}/>
                <div style={{position:"relative",flexShrink:0}}>
                  <input type="date" value={toISO(dAso)} onChange={e=>setDAso(fromISO(e.target.value))} style={{position:"absolute",inset:0,opacity:0,cursor:"pointer",width:"100%",height:"100%"}}/>
                  <div style={{width:36,height:36,borderRadius:8,background:t.input,border:"1px solid "+t.border,display:"flex",alignItems:"center",justifyContent:"center",color:t.muted,cursor:"pointer"}}><Ico t="calendar" sz={16}/></div>
                </div>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:10}}><button onClick={addRec} style={bs(t.accent,"#fff")}><Ico t="check" sz={16}/> Salvar</button><button onClick={()=>setShowForm(false)} style={bs(t.input,t.muted)}>Cancelar</button></div>
        </div>}

        <div ref={tableRef} className="table-wrap" style={{background:t.card,borderRadius:14,overflow:"hidden",border:"1px solid "+t.border}}>
          <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:520}}>
              <thead><tr style={{background:t.input}}>
                <th style={{padding:"12px 10px",textAlign:"center",width:40}}><input type="checkbox" checked={filtered.length>0&&filtered.every(r=>sel.has(r._i))} onChange={e=>{e.target.checked?setSel(new Set(filtered.map(r=>r._i))):setSel(new Set())}} style={{accentColor:t.accent,width:16,height:16}}/></th>
                <th className="col-photo" style={{padding:"12px 6px",width:48}}/>
                {[["nome","Nome"],["profissao","Profissão","col-prof"],["dataAso","Data ASO"]].map(([k,l,cls])=>(<th key={k} className={cls||""} onClick={()=>togSort(k)} style={{padding:"12px 12px",textAlign:"left",color:t.muted,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,cursor:"pointer",userSelect:"none"}}>{l} <SA col={k}/></th>))}
                <th style={{padding:"12px 10px",textAlign:"center",color:t.muted,fontSize:11,fontWeight:700,textTransform:"uppercase",width:80}}>Status</th>
                <th style={{width:70}}/>
              </tr></thead>
              <tbody>
                {filtered.length===0?<tr><td colSpan={7} style={{padding:40,textAlign:"center",color:t.muted}}><div style={{fontSize:36,marginBottom:8,opacity:0.3}}>📋</div><div style={{fontSize:14}}>Nenhum registro</div></td></tr>
                :filtered.map((r,i)=>{const sc=statusColor(r.dataAso);return(
                  <tr key={r._i+"-"+i} style={{background:sel.has(r._i)?t.accent+"11":i%2===0?"transparent":t.input+"55",borderBottom:"1px solid "+t.border+"22",transition:"background 0.15s"}} onMouseOver={e=>e.currentTarget.style.background=t.accent+"0d"} onMouseOut={e=>e.currentTarget.style.background=sel.has(r._i)?t.accent+"11":i%2===0?"transparent":t.input+"55"}>
                    <td style={{padding:"8px 10px",textAlign:"center"}}><input type="checkbox" checked={sel.has(r._i)} onChange={()=>{const ns=new Set(sel);ns.has(r._i)?ns.delete(r._i):ns.add(r._i);setSel(ns)}} style={{accentColor:t.accent,width:16,height:16}}/></td>
                    <td className="col-photo" style={{padding:"8px 6px"}}><Avatar src={r.foto} name={r.nome} size={34} accent={t.accent}/></td>
                    <td style={{padding:"8px 12px",fontWeight:600,fontSize:14}}>{r.nome}</td>
                    <td className="col-prof" style={{padding:"8px 12px",fontSize:14,color:t.muted}}>{r.profissao}</td>
                    <td style={{padding:"8px 12px",fontSize:14,fontFamily:"monospace"}}>{r.dataAso}</td>
                    <td style={{padding:"8px 10px",textAlign:"center"}}><span style={{display:"inline-block",padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:700,background:sc.bg,color:sc.color,border:"1px solid "+sc.color+"33"}}>{sc.label}</span></td>
                    <td style={{padding:"8px 6px",textAlign:"center",whiteSpace:"nowrap"}}><button onClick={()=>startEdit(r._i)} style={{background:"none",border:"none",color:t.muted,padding:4,borderRadius:6}} onMouseOver={e=>e.currentTarget.style.color=t.accent} onMouseOut={e=>e.currentTarget.style.color=t.muted}><Ico t="edit" sz={15}/></button><button onClick={()=>setConfirmDelOne(r._i)} style={{background:"none",border:"none",color:t.muted,padding:4,borderRadius:6}} onMouseOver={e=>e.currentTarget.style.color="#ef4444"} onMouseOut={e=>e.currentTarget.style.color=t.muted}><Ico t="trash" sz={15}/></button></td>
                  </tr>
                )})}
              {/* INLINE ADD ROW */}
              {inlineAdd&&<tr style={{background:t.accent+"08",borderBottom:"1px solid "+t.border+"22"}}>
                <td style={{padding:"6px 10px",textAlign:"center"}}></td>
                <td style={{padding:"6px"}}></td>
                <td style={{padding:"6px 8px"}}><input value={inNome} onChange={e=>setInNome(e.target.value)} placeholder="Nome *" style={{...is,padding:"6px 10px",fontSize:13}} onKeyDown={e=>e.key==="Enter"&&addInline()}/></td>
                <td className="col-prof" style={{padding:"6px 8px"}}><input value={inProf} onChange={e=>setInProf(e.target.value)} placeholder="Profissão" style={{...is,padding:"6px 10px",fontSize:13}} onKeyDown={e=>e.key==="Enter"&&addInline()}/></td>
                <td style={{padding:"6px 8px"}}><div style={{display:"flex",gap:3,alignItems:"center"}}>
                  <input value={inDAso} onChange={e=>setInDAso(e.target.value)} placeholder="dd/mm/aaaa *" style={{...is,padding:"6px 10px",fontSize:13,flex:1}} onKeyDown={e=>e.key==="Enter"&&addInline()}/>
                  <div style={{position:"relative",flexShrink:0}}>
                    <input type="date" value={toISO(inDAso)} onChange={e=>setInDAso(fromISO(e.target.value))} style={{position:"absolute",inset:0,opacity:0,cursor:"pointer",width:"100%",height:"100%"}}/>
                    <div style={{width:28,height:28,borderRadius:6,background:t.input,border:"1px solid "+t.border,display:"flex",alignItems:"center",justifyContent:"center",color:t.muted,cursor:"pointer"}}><Ico t="calendar" sz={13}/></div>
                  </div>
                </div></td>
                <td style={{padding:"6px"}}></td>
                <td style={{padding:"6px",textAlign:"center",whiteSpace:"nowrap"}}><button onClick={addInline} style={{background:"none",border:"none",color:"#16a34a",padding:4,borderRadius:6,cursor:"pointer"}}><Ico t="check" sz={15}/></button><button onClick={()=>{setInlineAdd(false);setInNome("");setInProf("");setInDAso("")}} style={{background:"none",border:"none",color:t.muted,padding:4,borderRadius:6,cursor:"pointer"}}><Ico t="x" sz={15}/></button></td>
              </tr>}
              </tbody>
            </table>
          </div>
          <div className="table-footer" style={{padding:"10px 18px",borderTop:"1px solid "+t.border+"22",display:"flex",justifyContent:"space-between",fontSize:12,color:t.muted,alignItems:"center",flexWrap:"wrap",gap:8}}>
            <span>Exibindo {filtered.length} de {recsArr.length}</span>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {!inlineAdd&&<button onClick={()=>setInlineAdd(true)} style={{background:"none",border:"1px dashed "+t.accent,color:t.accent,padding:"4px 12px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><Ico t="plus" sz={13}/> Nova linha</button>}
              <span>{view==="all"?"Todos":view==="critical"?"Crítico":view==="warning"?"Atenção":view==="month"?"Próximo 30d":"Regular"}</span>
            </div>
          </div>
        </div>
        </>}

        {/* PROFILE EDIT MODAL */}
        {showProfile&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setShowProfile(false)}>
          <div className="fade-in profile-modal-inner" onClick={e=>e.stopPropagation()} style={{background:t.card,borderRadius:20,padding:30,maxWidth:420,width:"100%",border:"1px solid "+t.border,boxShadow:"0 20px 50px rgba(0,0,0,0.4)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <h3 style={{margin:0,fontSize:18,fontWeight:700,color:t.text}}>Editar Perfil</h3>
              <button onClick={()=>setShowProfile(false)} style={{background:"none",border:"none",color:t.muted,padding:4,cursor:"pointer"}}><Ico t="x" sz={20}/></button>
            </div>

            <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
              <input ref={profFotoRef} type="file" accept="image/*" onChange={handleProfFoto} style={{display:"none"}}/>
              <div onClick={()=>profFotoRef.current?.click()} style={{width:100,height:100,borderRadius:"50%",border:"3px dashed "+(profFoto?t.accent:t.border),background:profFoto?"transparent":t.input,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",position:"relative",transition:"border-color 0.2s"}}
                onMouseOver={e=>e.currentTarget.style.borderColor=t.accent} onMouseOut={e=>e.currentTarget.style.borderColor=profFoto?t.accent:t.border}>
                {profFoto?<img src={profFoto} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                :<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,color:t.muted}}>
                  <Ico t="camera" sz={28}/><span style={{fontSize:10,fontWeight:600}}>FOTO</span>
                </div>}
                <div style={{position:"absolute",bottom:0,right:0,width:28,height:28,borderRadius:"50%",background:t.accent,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",border:"2px solid "+t.card}}><Ico t="camera" sz={12}/></div>
              </div>
            </div>

            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:16,fontWeight:700,color:t.text}}>{currentUser}</div>
              <span style={{fontSize:11,fontWeight:700,color:roleColor,background:roleColor+"18",padding:"2px 8px",borderRadius:4}}>{roleLabel}</span>
            </div>

            {profErr&&<div className="fade-in" style={{background:"rgba(220,38,38,0.08)",border:"1px solid rgba(220,38,38,0.2)",borderRadius:10,padding:"10px 14px",marginBottom:14,color:"#ef4444",fontSize:13,fontWeight:500,display:"flex",alignItems:"center",gap:8}}><Ico t="alert" sz={16}/> {profErr}</div>}
            {profOk&&<div className="fade-in" style={{background:"rgba(22,163,74,0.08)",border:"1px solid rgba(22,163,74,0.2)",borderRadius:10,padding:"10px 14px",marginBottom:14,color:"#16a34a",fontSize:13,fontWeight:500,display:"flex",alignItems:"center",gap:8}}><Ico t="check" sz={16}/> {profOk}</div>}

            <div style={{marginBottom:14}}>
              <label style={{color:t.muted,fontSize:12,fontWeight:600,marginBottom:6,display:"block",textTransform:"uppercase",letterSpacing:0.5}}>Nova Senha <span style={{fontWeight:400,textTransform:"none"}}>(deixe vazio para manter)</span></label>
              <div style={{position:"relative"}}>
                <input type={profSp?"text":"password"} value={profNewPass} onChange={e=>{setProfNewPass(e.target.value);setProfErr("");setProfOk("")}} placeholder="Nova senha (mín. 4 caracteres)" style={{padding:"10px 42px 10px 14px",borderRadius:8,border:"1px solid "+t.border,background:t.input,color:t.text,fontSize:14,outline:"none",width:"100%",boxSizing:"border-box"}}/>
                <button onClick={()=>setProfSp(!profSp)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:t.muted,padding:4,cursor:"pointer"}}><Ico t={profSp?"eyeOff":"eye"} sz={16}/></button>
              </div>
            </div>
            {profNewPass&&<div style={{marginBottom:14}}>
              <label style={{color:t.muted,fontSize:12,fontWeight:600,marginBottom:6,display:"block",textTransform:"uppercase",letterSpacing:0.5}}>Confirmar Nova Senha</label>
              <input type={profSp?"text":"password"} value={profNewPc} onChange={e=>{setProfNewPc(e.target.value);setProfErr("");setProfOk("")}} onKeyDown={e=>e.key==="Enter"&&saveProfProfile()} placeholder="Repita a nova senha" style={{padding:"10px 14px",borderRadius:8,border:"1px solid "+t.border,background:t.input,color:t.text,fontSize:14,outline:"none",width:"100%",boxSizing:"border-box"}}/>
            </div>}

            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button onClick={()=>setShowProfile(false)} style={{...bs(t.input,t.text),flex:1,justifyContent:"center",padding:"10px 0"}}>Cancelar</button>
              <button onClick={saveProfProfile} style={{...bs(t.accent,"#fff"),flex:1,justifyContent:"center",padding:"10px 0"}}>Salvar</button>
            </div>
          </div>
        </div>}
      </main>
    </div>
  );
}

/* ===== ROOT ===== */
function App(){
  const[user,setUser]=useState(()=>localStorage.getItem("aso_logged"));
  const[userFoto,setUserFoto]=useState(()=>localStorage.getItem("aso_logged_foto")||"");
  const[userRole,setUserRole]=useState(()=>localStorage.getItem("aso_logged_role")||"operacional");
  const login=(u,f,r)=>{localStorage.setItem("aso_logged",u);localStorage.setItem("aso_logged_foto",f||"");localStorage.setItem("aso_logged_role",r||"operacional");setUser(u);setUserFoto(f||"");setUserRole(r||"operacional")};
  const logout=()=>{localStorage.removeItem("aso_logged");localStorage.removeItem("aso_logged_foto");localStorage.removeItem("aso_logged_role");setUser(null);setUserFoto("");setUserRole("operacional")};
  const updateFoto=(f)=>{localStorage.setItem("aso_logged_foto",f||"");setUserFoto(f||"")};
  if(!user)return <Auth onLogin={login}/>;
  return <Dash currentUser={user} userFoto={userFoto} userRole={userRole} onLogout={logout} onUpdateFoto={updateFoto}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(r=>{
      console.log('SW registrado:',r.scope);
      // Check for updates periodically
      setInterval(()=>r.update(),60*60*1000);
    }).catch(e=>console.log('SW erro:',e));
  });
  // Listen for app install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt',(e)=>{
    e.preventDefault();
    deferredPrompt=e;
    // Show install banner after 3 seconds
    setTimeout(()=>{
      if(deferredPrompt){
        const bar=document.createElement('div');
        bar.id='pwa-install-bar';
        bar.style.cssText='position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#0ea5e9,#0d9488);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:9999;font-family:Segoe UI,sans-serif;box-shadow:0 -4px 20px rgba(0,0,0,0.3);animation:bannerSlide 0.4s ease-out';
        bar.innerHTML='<div style="display:flex;align-items:center;gap:10px"><span style="font-size:24px">🩺</span><div><strong style="font-size:14px">Instalar ASO Controla</strong><div style="font-size:12px;opacity:0.85">Adicione como app no seu dispositivo</div></div></div><div style="display:flex;gap:8px"><button id="pwa-dismiss" style="padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.3);background:transparent;color:#fff;font-weight:600;font-size:13px;cursor:pointer">Depois</button><button id="pwa-install" style="padding:8px 20px;border-radius:8px;border:none;background:#fff;color:#0d9488;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15)">Instalar</button></div>';
        document.body.appendChild(bar);
        document.getElementById('pwa-install').onclick=async()=>{deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;deferredPrompt=null;bar.remove()};
        document.getElementById('pwa-dismiss').onclick=()=>{bar.remove();deferredPrompt=null};
      }
    },3000);
  });
}
</script>
